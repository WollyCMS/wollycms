name = "wollycms-docs"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

# Assets served by @astrojs/cloudflare adapter
[assets]
directory = "dist"

# Cloudflare Images binding
[images]
binding = "IMAGES"

# Session KV namespace
[[kv_namespaces]]
binding = "SESSION"
id = "63c41791eaf742f9a78becec46355d38"

# GA_MEASUREMENT_ID is set as a secret (not in this file)
# After deploy: wrangler secret put GA_MEASUREMENT_ID --name wollycms-docs
